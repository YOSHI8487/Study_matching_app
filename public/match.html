<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>StudyMatch — マッチング結果</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      background: #f0f2ff;
      padding: 1.5rem 1rem 3rem;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 800px;
      margin: 0 auto 2rem;
    }
    .logo-title { display: flex; align-items: center; gap: 0.5rem; }
    .logo-title span { font-size: 1.5rem; }
    .logo-title h1 { font-size: 1.25rem; color: #1a1a2e; }
    .btn-sm {
      padding: 0.4rem 0.9rem;
      border-radius: 8px;
      border: none;
      font-size: 0.85rem;
      cursor: pointer;
      font-weight: 600;
    }
    .btn-logout { background: #f0f0f0; color: #666; }
    .btn-logout:hover { background: #e0e0e0; }

    .container { max-width: 800px; margin: 0 auto; }

    .section-title {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888;
      margin-bottom: 1rem;
    }

    /* Comparison header */
    .compare-header {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 0.75rem;
    }
    .compare-label {
      text-align: center;
      padding: 0.5rem;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 700;
    }
    .label-gemini { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
    .label-tag { background: #e2e8f0; color: #555; }

    /* Match cards grid */
    .cards-pair {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1rem;
    }
    .match-card {
      background: white;
      border-radius: 16px;
      padding: 1.25rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      position: relative;
    }
    .match-card.gemini-card { border-top: 3px solid #667eea; }
    .match-card.tag-card { border-top: 3px solid #a0aec0; }

    .rank-badge {
      position: absolute;
      top: -10px;
      left: 1rem;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 2px 10px;
      border-radius: 20px;
    }
    .gemini-card .rank-badge { background: #667eea; color: white; }
    .tag-card .rank-badge { background: #a0aec0; color: white; }

    .card-name {
      font-weight: 700;
      font-size: 1rem;
      color: #1a1a2e;
      margin-top: 0.5rem;
      margin-bottom: 0.25rem;
    }
    .card-affiliation {
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 0.75rem;
    }
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 0.75rem;
    }
    .tag {
      font-size: 0.72rem;
      padding: 2px 8px;
      border-radius: 20px;
      background: #eef0ff;
      color: #667eea;
      font-weight: 600;
    }
    .score-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }
    .score-label { font-size: 0.75rem; color: #888; white-space: nowrap; }
    .score-bar-wrap {
      flex: 1;
      height: 6px;
      background: #eee;
      border-radius: 3px;
      overflow: hidden;
    }
    .score-bar {
      height: 100%;
      border-radius: 3px;
      transition: width 0.8s ease;
    }
    .gemini-card .score-bar { background: linear-gradient(90deg, #667eea, #764ba2); }
    .tag-card .score-bar { background: #a0aec0; }
    .score-num { font-size: 0.75rem; font-weight: 700; color: #555; }

    .reason-box {
      background: #f8f9ff;
      border-radius: 8px;
      padding: 0.6rem 0.75rem;
      font-size: 0.82rem;
      color: #444;
      line-height: 1.55;
      font-style: italic;
    }
    .tag-card .reason-box {
      background: #f7f7f7;
      color: #666;
      font-style: normal;
    }

    /* Diff insight */
    .diff-insight {
      background: linear-gradient(135deg, #667eea11, #764ba211);
      border: 1px solid #667eea33;
      border-radius: 12px;
      padding: 1rem 1.25rem;
      margin: 1.5rem 0;
      font-size: 0.875rem;
      color: #444;
      line-height: 1.6;
    }
    .diff-insight strong { color: #667eea; }

    /* Loading */
    .loading {
      text-align: center;
      padding: 4rem 0;
      color: #888;
    }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid #e2e8f0;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box {
      background: #fff5f5;
      border: 1px solid #fed7d7;
      border-radius: 12px;
      padding: 1rem 1.25rem;
      color: #e53e3e;
      text-align: center;
      margin: 2rem 0;
    }

    .btn-retry {
      margin-top: 0.75rem;
      padding: 0.6rem 1.5rem;
      background: #667eea;
      color: white;
      border-radius: 10px;
      border: none;
      font-weight: 600;
      cursor: pointer;
    }

    @media (max-width: 520px) {
      .compare-header, .cards-pair { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo-title">
      <span>📚</span>
      <h1>StudyMatch</h1>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn-sm btn-logout" onclick="goProfile()">プロフィール編集</button>
      <button class="btn-sm btn-logout" onclick="logout()">ログアウト</button>
    </div>
  </header>

  <div class="container">
    <div id="content">
      <div class="loading">
        <div class="spinner"></div>
        <p>Gemini AIがあなたに合う仲間を探しています…</p>
      </div>
    </div>
  </div>

  <script>
    async function logout() {
      await fetch("/api/auth/logout", { method: "POST" });
      location.href = "/";
    }

    function goProfile() {
      location.href = "/onboarding.html";
    }

    function renderMatches(data) {
      const { geminiMatches, tagMatches } = data;
      const container = document.getElementById("content");

      if (!geminiMatches.length && !tagMatches.length) {
        container.innerHTML = '<div class="error-box">マッチング候補が見つかりませんでした。</div>';
        return;
      }

      // Build diff insight
      const diffNames = geminiMatches.map((m) => m.nickname).join("、");
      const tagNames = tagMatches.map((m) => m.nickname).join("、");
      const hasDiff = diffNames !== tagNames;

      let html = "";

      // Comparison labels
      html += `<div class="compare-header">
        <div class="compare-label label-gemini">🤖 Gemini AIマッチ</div>
        <div class="compare-label label-tag">🏷️ タグだけのマッチ</div>
      </div>`;

      // Cards pair
      const maxRows = Math.max(geminiMatches.length, tagMatches.length);
      for (let i = 0; i < maxRows; i++) {
        const g = geminiMatches[i];
        const t = tagMatches[i];
        html += `<div class="cards-pair">`;

        if (g) {
          html += `<div class="match-card gemini-card">
            <span class="rank-badge">#${i + 1} Gemini</span>
            <div class="card-name">${esc(g.nickname)}</div>
            <div class="card-affiliation">${esc(g.affiliation)}</div>
            <div class="tags">${(g.studyFields || []).slice(0, 4).map((f) => `<span class="tag">${esc(f)}</span>`).join("")}</div>
            <div class="score-row">
              <span class="score-label">AI相性</span>
              <div class="score-bar-wrap"><div class="score-bar" style="width:${g.geminiScore ?? 0}%"></div></div>
              <span class="score-num">${g.geminiScore ?? "-"}%</span>
            </div>
            <div class="score-row">
              <span class="score-label">タグ一致</span>
              <div class="score-bar-wrap"><div class="score-bar" style="width:${g.tagScore ?? 0}%"></div></div>
              <span class="score-num">${g.tagScore ?? 0}%</span>
            </div>
            <div class="reason-box">「${esc(g.reason || "")}」</div>
          </div>`;
        } else {
          html += `<div></div>`;
        }

        if (t) {
          html += `<div class="match-card tag-card">
            <span class="rank-badge">#${i + 1} タグ</span>
            <div class="card-name">${esc(t.nickname)}</div>
            <div class="card-affiliation">${esc(t.affiliation)}</div>
            <div class="tags">${(t.studyFields || []).slice(0, 4).map((f) => `<span class="tag">${esc(f)}</span>`).join("")}</div>
            <div class="score-row">
              <span class="score-label">タグ一致</span>
              <div class="score-bar-wrap"><div class="score-bar" style="width:${t.tagScore ?? 0}%"></div></div>
              <span class="score-num">${t.tagScore ?? 0}%</span>
            </div>
            <div class="reason-box" style="font-style:normal;color:#888">
              共通タグ: ${(t.studyFields || []).join(", ") || "なし"}
            </div>
          </div>`;
        } else {
          html += `<div></div>`;
        }

        html += `</div>`;
      }

      // Diff insight block
      if (hasDiff) {
        html += `<div class="diff-insight">
          <strong>💡 タグでは読めないものをGeminiが読みました</strong><br>
          タグマッチの上位は <strong>${esc(tagNames)}</strong> でしたが、
          Geminiは勉強スタイルや感情的なニーズを読み取り
          <strong>${esc(diffNames)}</strong> を選びました。
          同じタグでも、目標への本気度や孤独感・仲間への期待値など、
          文章でしか伝わらない相性があります。
        </div>`;
      } else {
        html += `<div class="diff-insight">
          タグマッチとGeminiマッチが一致しました。分野の一致度が高く、かつ文章からも深い相性が確認されています。
        </div>`;
      }

      container.innerHTML = html;
    }

    function esc(str) {
      return String(str ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    async function loadMatches() {
      const container = document.getElementById("content");
      try {
        const r = await fetch("/api/match", { method: "POST" });
        const data = await r.json();
        if (!r.ok) {
          if (r.status === 400 && data.error?.includes("プロフィール")) {
            container.innerHTML = `<div class="error-box">
              プロフィールを完成させてからマッチングできます。
              <br><button class="btn-retry" onclick="location.href='/onboarding.html'">プロフィールを設定する</button>
            </div>`;
          } else {
            throw new Error(data.error || "エラーが発生しました");
          }
          return;
        }
        renderMatches(data);
      } catch (err) {
        container.innerHTML = `<div class="error-box">
          ${esc(err.message)}
          <br><button class="btn-retry" onclick="loadMatches()">再試行</button>
        </div>`;
      }
    }

    // Check auth then load
    (async () => {
      try {
        const r = await fetch("/api/me");
        if (!r.ok) { location.href = "/"; return; }
        await loadMatches();
      } catch {
        location.href = "/";
      }
    })();
  </script>
</body>
</html>
